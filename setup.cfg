[mypy]
ignore_missing_imports = True
exclude = toshi_hazard_store/deaggregate_hazard_mp.py,
     toshi_hazard_store/scripts/migration/demo_arrow_query_strategies.py,
     toshi_hazard_store/scripts/migration/demo_thp_arrow_strategies.py

[coverage:run]
# uncomment the following to omit files during running
#omit =

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main
    log.debug
    log.info
    if TYPE_CHECKING:
omit =
    toshi_hazard_store/model/revision_4/extract_disagg_hdf5.py
    toshi_hazard_store/scripts/ths_iceberg.py
    toshi_hazard_store/scripts/migration/**/*.py
    # toshi_hazard_store/scripts/**/*.py

[tox:tox]
isolated_build = true
runner = uv-venv-lock-runner
envlist = audit, py310, py311, py312, format, lint, build-linux, build-macos

[gh-actions]
python =
    3.12: py312
    3.11: py311, format, lint, build
    3.10: py310

[testenv]
dependency_groups =
    openquake
allowlist_externals =
    pytest
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
commands =
    pytest tests toshi_hazard_store #  this will emit logging output for any failed tests, and fail
    pytest --cov=toshi_hazard_store --cov-branch --cov-report=xml --cov-report=term-missing tests toshi_hazard_store

[testenv:audit]
allowlist_externals =
    uv
commands =
    uv export --all-groups --format requirements-txt -o audit.txt
    uv run pip-audit -r audit.txt
    uv run safety scan

[testenv:format]
allowlist_externals =
    ruff
commands =
    ruff format toshi_hazard_store tests
    ruff check --fix --select I toshi_hazard_store tests

[testenv:lint]
allowlist_externals =
    ruff
    mypy
commands =
    ruff check toshi_hazard_store tests
    mypy toshi_hazard_store tests

[testenv:build-linux]
platform = linux
allowlist_externals =
    uv
    mkdocs
    twine
commands =
    uv build
    mkdocs build
    twine check dist/*

[testenv:build-macos]
platform = darwin
allowlist_externals =
    uv
    mkdocs
    twine
commands =
    uv build
    mkdocs build
    twine check dist/*
